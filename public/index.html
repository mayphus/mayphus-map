<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mayphus-map</title>
    <meta
      name="description"
      content="A focused Hangzhou macro road map with lightweight export controls."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.7.0/dist/maplibre-gl.css"
    />
    <style>
      :root {
        color-scheme: light;
        --panel-bg: rgba(248, 246, 240, 0.88);
        --panel-strong: rgba(245, 241, 232, 0.96);
        --panel-line: rgba(53, 72, 86, 0.16);
        --panel-shadow: 0 24px 80px rgba(16, 25, 35, 0.18);
        --text: #15212c;
        --muted: #596878;
        --accent: #2f6d8e;
        --accent-strong: #173b52;
        --chip-bg: rgba(25, 59, 82, 0.08);
        --active-bg: rgba(27, 64, 89, 0.94);
        --active-text: #edf6fb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        min-height: 100%;
        height: 100%;
      }

      body {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        background:
          radial-gradient(circle at 18% 12%, rgba(224, 197, 140, 0.34), transparent 24%),
          radial-gradient(circle at 82% 18%, rgba(104, 170, 196, 0.28), transparent 26%),
          linear-gradient(180deg, #efe6d4 0%, #dce6eb 48%, #d3e2ea 100%);
        color: var(--text);
      }

      .app-shell {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .hero-panel {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 20;
        width: min(410px, calc(100vw - 36px));
        padding: 18px 18px 16px;
        border: 1px solid var(--panel-line);
        border-radius: 28px;
        background: var(--panel-bg);
        backdrop-filter: blur(20px);
        box-shadow: var(--panel-shadow);
      }

      .hero-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 14px 0 0;
        font-size: clamp(2.4rem, 5vw, 3.6rem);
        line-height: 0.9;
        letter-spacing: -0.05em;
      }

      .hero-copy {
        margin: 14px 0 0;
        font-size: 1rem;
        line-height: 1.62;
        color: var(--muted);
        max-width: 32ch;
      }

      .hero-chip {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        background: var(--chip-bg);
        color: var(--accent-strong);
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .story-card {
        margin-top: 18px;
        padding: 16px 16px 14px;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(255, 252, 247, 0.92), rgba(241, 238, 229, 0.84));
        border: 1px solid rgba(47, 70, 85, 0.12);
      }

      .story-kicker {
        margin: 0;
        color: var(--accent);
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .story-title {
        margin: 8px 0 0;
        font-size: 1.45rem;
        line-height: 1.08;
      }

      .story-copy {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.96rem;
        line-height: 1.55;
      }

      .preset-list {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }

      .preset-button {
        display: grid;
        gap: 4px;
        width: 100%;
        padding: 14px 15px;
        border: 1px solid rgba(42, 58, 70, 0.12);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.44);
        text-align: left;
        cursor: pointer;
        transition:
          transform 180ms ease,
          background 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      .preset-button:hover {
        transform: translateY(-1px);
        border-color: rgba(24, 58, 79, 0.2);
        box-shadow: 0 12px 28px rgba(31, 48, 62, 0.12);
      }

      .preset-button.is-active {
        background: var(--active-bg);
        border-color: transparent;
        box-shadow: 0 16px 32px rgba(24, 45, 60, 0.2);
      }

      .preset-label,
      .preset-description {
        color: var(--muted);
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
      }

      .preset-label {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .preset-title {
        font-size: 1rem;
        line-height: 1.25;
      }

      .preset-description {
        font-size: 0.86rem;
        line-height: 1.45;
      }

      .preset-button.is-active .preset-label,
      .preset-button.is-active .preset-description,
      .preset-button.is-active .preset-title {
        color: var(--active-text);
      }

      .panel-note {
        margin: 14px 2px 0;
        color: var(--muted);
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        font-size: 0.84rem;
        line-height: 1.45;
      }

      .map-canvas {
        width: 100vw;
        height: 100vh;
      }

      .share-panel {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 20;
        display: grid;
        gap: 8px;
        justify-items: end;
      }

      .share-button {
        border: 1px solid rgba(53, 72, 86, 0.18);
        height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        background: rgba(249, 247, 241, 0.94);
        backdrop-filter: blur(14px);
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.12);
        color: var(--accent-strong);
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .share-status {
        margin: 0;
        min-height: 14px;
        max-width: 180px;
        text-align: right;
        color: var(--muted);
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        font-size: 0.75rem;
      }

      @media (max-width: 640px) {
        .hero-panel {
          top: 12px;
          left: 12px;
          width: calc(100vw - 24px);
          padding: 14px 14px 12px;
          border-radius: 22px;
        }

        .hero-copy {
          max-width: none;
        }

        .story-card {
          padding: 14px 14px 12px;
        }

        .preset-button {
          padding: 12px 13px;
        }

        .share-panel {
          right: 12px;
          bottom: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/js/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mayphus-map</title>
    <meta
      name="description"
      content="A focused Hangzhou macro road map with lightweight export controls."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.7.0/dist/maplibre-gl.css"
    />
    <style>
      :root {
        color-scheme: light;
        --panel-bg: rgba(251, 253, 255, 0.88);
        --panel-line: rgba(71, 85, 105, 0.18);
        --panel-shadow: 0 20px 60px rgba(15, 23, 42, 0.16);
        --text: #122033;
        --muted: #5c6b7d;
        --accent: #315f8a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        min-height: 100%;
        height: 100%;
      }

      body {
        font-family: "Avenir Next", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top, rgba(165, 214, 255, 0.3), transparent 32%),
          linear-gradient(180deg, #eaf2f8 0%, #d9e5ef 100%);
        color: var(--text);
      }

      .app-shell {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .hero-panel {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 20;
        width: min(360px, calc(100vw - 36px));
        padding: 18px 18px 16px;
        border: 1px solid var(--panel-line);
        border-radius: 22px;
        background: var(--panel-bg);
        backdrop-filter: blur(20px);
        box-shadow: var(--panel-shadow);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 0.94;
      }

      .hero-copy {
        margin: 12px 0 0;
        font-size: 0.96rem;
        line-height: 1.6;
        color: var(--muted);
      }

      .map-canvas {
        width: 100vw;
        height: 100vh;
      }

      @media (max-width: 640px) {
        .hero-panel {
          top: 12px;
          left: 12px;
          width: calc(100vw - 24px);
          padding: 14px 14px 12px;
          border-radius: 18px;
        }

        .hero-copy {
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/js/main.js"></script>
  </body>
</html>
